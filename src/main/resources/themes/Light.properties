@baseTheme = light

@background = #ffffff
@foreground = #1e1e1e
@header = #f2f2f2
@selection = #dbeafe
@accent = #2563eb

Panel.background = @background
Panel.foreground = @foreground

TitlePane.background = @background
TitlePane.foreground = @foreground

MenuBar.background = @background
MenuBar.foreground = @foreground

Menu.background = @background
Menu.foreground = @foreground

MenuItem.background = @background
MenuItem.foreground = @foreground

TabbedPane.background = @background
TabbedPane.selectedBackground = @header
TabbedPane.foreground = @foreground

List.background = @background
List.foreground = @foreground
List.selectionBackground = @selection
List.selectionForeground = @foreground

TextField.background = @background
TextField.foreground = @foreground

PasswordField.background = @background
PasswordField.foreground = @foreground

ComboBox.background = @background
ComboBox.foreground = @foreground

Button.background = @header
Button.foreground = @foreground

ToolBar.background = @background

Component.focusColor = @accent
Component.focusedBorderColor = @accent
